<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Losowanie ownerów</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: #f8fafc;
}

.container {
    width: 100%;
    max-width: 520px;
    background: rgba(30, 41, 59, 0.7);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 40px;
    border-radius: 24px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    text-align: center;
}

h1 {
    font-size: 28px;
    font-weight: 800;
    color: #f8fafc;
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.info {
    background: rgba(239, 68, 68, 0.15);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #fca5a5;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 30px;
}

button {
    width: 100%;
    padding: 18px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
    color: white;
    font-size: 18px;
    cursor: pointer;
    font-weight: 700;
    box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.5);
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 25px -5px rgba(37, 99, 235, 0.6);
    background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
}

button:active {
    transform: translateY(0);
}

.result {
    margin-top: 30px;
    padding: 25px;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 16px;
}

.result h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #94a3b8;
    margin-bottom: 10px;
}

#winner {
    font-size: 36px;
    font-weight: 800;
    color: #34d399;
    min-height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s ease;
}

#winner.pulse {
    transform: scale(1.05);
}

.footer {
    margin-top: 30px;
    color: #64748b;
    font-size: 13px;
    line-height: 1.4;
}
</style>

</head>

<body>

<div class="container">

    <h1> Losowanie Ownerów </h1>

    <div class="info">
        Losowanie ownerów zadań
    </div>

    <button onclick="drawOwner()">
        🎲 URUCHOM LOSOWANIE
    </button>

    <div class="result">
        <h2>Wybrany owner</h2>
        <div id="winner">-</div>
    </div>

    <div class="footer">
        Jak zawsze zostanie wybrany najlepszy z najlepszychy
    </div>

</div>

<script>
const owners = [
    "Norbert",
    "Bartek",
    "Jakub",
    "Kuba",
    "Dawid",
    "Magda",
    "Paweł",
    "Marcin Langa"
];

function drawOwner(){
    const result = document.getElementById("winner");
    let count = 0;
    let speed = 50;

    const interval = setInterval(() => {
        result.innerText = owners[Math.floor(Math.random() * owners.length)];
        
        // Dodanie subtelnego efektu pulsowania w trakcie losowania
        result.classList.add('pulse');
        setTimeout(() => result.classList.remove('pulse'), 100);

        count++;

        if(count > 35){
            clearInterval(interval);
            result.innerText = "🎉 Maaaarcin Laaaanngggaaaaaaa 🎉";
            // Efektowne powiększenie końcowe
            result.style.transform = "scale(1.1)";
            setTimeout(() => {
                result.style.transform = "scale(1)";
            }, 300);
        }
    }, speed);
}
</script>

</body>
</html>
